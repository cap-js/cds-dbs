name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, auto_merge_enabled]

# Allow parallel jobs on `main`, so that each commit is tested. For PRs, run only the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Tests
    permissions:
      packages: write

    env:
      FORCE_COLOR: true

    strategy:
      fail-fast: true
      matrix:
        node: [22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm install -g @sap/cds-dk
      - run: npm run lint
      - id: hce
        uses: ./.github/actions/hce
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # testing
      - run: npm test -ws
        env:
          HANA_HOST: 'localhost'
      - name: sqlite driver (better-sqlite3))
        run: npm test -w sqlite
        env:
          CDS_REQUIRES_DB_DRIVER: 'better-sqlite3'
      - name: sqlite driver (sql.js)
        run: npm test -w sqlite
        env:
          CDS_REQUIRES_DB_DRIVER: 'sql.js'
